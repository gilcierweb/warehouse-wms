<!DOCTYPE html>
<html>
<head>
    <title>WebSocket Test - Sem Mensagens</title>
</head>
<body>
    <h1>Teste WebSocket - Apenas Conexão</h1>
    <div id="output"></div>
    <button onclick="testPing()">Enviar Ping</button>
    <button onclick="testHello()">Enviar Hello</button>
    <button onclick="testEmpty()">Enviar Vazio</button>
    
    <script>
        const output = document.getElementById('output');
        let ws = null;
        
        function log(message) {
            const div = document.createElement('div');
            div.textContent = new Date().toLocaleTimeString() + ': ' + message;
            output.appendChild(div);
            console.log(message);
        }
        
        function connect() {
            log('=== Conectando WebSocket ===');
            
            ws = new WebSocket('ws://localhost:8080/ws/live');
            
            ws.onopen = () => {
                log('✅ CONECTADO - Mantendo conexão aberta...');
                log('Ready State: ' + ws.readyState);
                
                // Não enviar nada, apenas manter conexão
            };
            
            ws.onmessage = (event) => {
                log('📥 Mensagem recebida: ' + event.data);
            };
            
            ws.onclose = (event) => {
                log('🔌 Fechado: Code=' + event.code + ', Reason=' + event.reason + ', Clean=' + event.wasClean);
                
                switch (event.code) {
                    case 1000: log('✅ Fechamento normal'); break;
                    case 1001: log('⚠️ Endpoint está indo embora'); break;
                    case 1002: log('❌ Erro de protocolo'); break;
                    case 1003: log('❌ Dados não suportados'); break;
                    case 1006: log('❌ Conexão fechada anormalmente'); break;
                    case 1007: log('❌ UTF-8 inválido'); break;
                    case 1008: log('❌ Violou política'); break;
                    case 1009: log('❌ Mensagem muito grande'); break;
                    case 1011: log('❌ Erro no servidor'); break;
                    default: log('❓ Código desconhecido: ' + event.code);
                }
            };
            
            ws.onerror = (error) => {
                log('❌ Erro: ' + error);
            };
        }
        
        function testPing() {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                log('❌ WebSocket não está conectado');
                return;
            }
            
            try {
                ws.send(JSON.stringify({ type: 'ping', timestamp: Date.now() }));
                log('📤 Ping enviado');
            } catch (e) {
                log('❌ Erro ao enviar ping: ' + e);
            }
        }
        
        function testHello() {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                log('❌ WebSocket não está conectado');
                return;
            }
            
            try {
                ws.send('hello');
                log('📤 "hello" enviado');
            } catch (e) {
                log('❌ Erro ao enviar hello: ' + e);
            }
        }
        
        function testEmpty() {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                log('❌ WebSocket não está conectado');
                return;
            }
            
            try {
                ws.send('');
                log('📤 Mensagem vazia enviada');
            } catch (e) {
                log('❌ Erro ao enviar vazio: ' + e);
            }
        }
        
        // Conectar automaticamente
        connect();
        
        // Testar se a conexão permanece após 10 segundos
        setTimeout(() => {
            if (ws && ws.readyState === WebSocket.OPEN) {
                log('✅ Conexão estável após 10 segundos');
            } else {
                log('❌ Conexão não permaneceu');
            }
        }, 10000);
    </script>
</body>
</html>
