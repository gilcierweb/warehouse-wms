<!DOCTYPE html>
<html>
<head>
    <title>WebSocket Test Simples</title>
</head>
<body>
    <h1>Teste WebSocket Simples</h1>
    <div id="output"></div>
    
    <script>
        const output = document.getElementById('output');
        
        function log(message) {
            const div = document.createElement('div');
            div.textContent = new Date().toLocaleTimeString() + ': ' + message;
            output.appendChild(div);
            console.log(message);
        }
        
        // Testar diferentes URLs
        const urls = [
            'ws://localhost:8080/ws/live',
            'ws://localhost:8080/ws',
            'ws://localhost:8080/live',
            'ws://localhost:8080'
        ];
        
        urls.forEach((url, index) => {
            log(`\n=== Testando URL ${index + 1}: ${url} ===`);
            
            const ws = new WebSocket(url);
            
            ws.onopen = () => {
                log(`✅ CONECTADO: ${url}`);
                log(`Ready State: ${ws.readyState}`);
                
                // Tentar enviar uma mensagem
                try {
                    ws.send(JSON.stringify({ type: 'ping', timestamp: Date.now() }));
                    log('📤 Ping enviado');
                } catch (e) {
                    log(`❌ Erro ao enviar ping: ${e}`);
                }
                
                // Fechar após 3 segundos
                setTimeout(() => {
                    ws.close();
                }, 3000);
            };
            
            ws.onmessage = (event) => {
                log(`📥 Mensagem recebida: ${event.data}`);
            };
            
            ws.onclose = (event) => {
                log(`🔌 Fechado: Code=${event.code}, Reason=${event.reason}, Clean=${event.wasClean}`);
                
                // Interpretar código
                switch (event.code) {
                    case 1000: log('✅ Fechamento normal'); break;
                    case 1001: log('⚠️ Endpoint está indo embora'); break;
                    case 1002: log('❌ Erro de protocolo'); break;
                    case 1003: log('❌ Dados não suportados'); break;
                    case 1006: log('❌ Conexão fechada anormalmente'); break;
                    case 1007: log('❌ UTF-8 inválido'); break;
                    case 1008: log('❌ Violou política'); break;
                    case 1009: log('❌ Mensagem muito grande'); break;
                    case 1011: log('❌ Erro no servidor'); break;
                    default: log(`❓ Código desconhecido: ${event.code}`);
                }
            };
            
            ws.onerror = (error) => {
                log(`❌ Erro: ${error}`);
            };
        });
    </script>
</body>
</html>
