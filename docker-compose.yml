services:
  # Banco de dados PostgreSQL
  postgres:
    image: postgres:18-alpine
    container_name: wms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-warehouse_wms_development}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-warehouse_wms_development}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - wms-network

  # Backend API Rust
  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.backend
    container_name: wms-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-gil123}@postgres:5432/${POSTGRES_DB:-warehouse_wms_development}
      HOST: 0.0.0.0
      PORT: 8080
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
      JWT_EXPIRY_HOURS: ${JWT_EXPIRY_HOURS:-8}
      ALERT_THRESHOLD: ${ALERT_THRESHOLD:-80}
      RUST_LOG: ${RUST_LOG:-info}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - wms-network

  # Frontend Nuxt.js
  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
    container_name: wms-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NUXT_PORT: 3000
      API_BASE: http://backend:8080
      WS_BASE: ws://backend:8080
      NODE_ENV: production
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - wms-network

volumes:
  postgres_data:
    driver: local

networks:
  wms-network:
    driver: bridge
