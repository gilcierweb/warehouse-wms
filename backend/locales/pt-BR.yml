  exit:
    title: "Saída"
    success: "Saída registrada com sucesso"
    slot_not_occupied: "Vaga não está ocupada"
  stats:
    title: "Estatísticas"
    total_slots: "Total de Vagas"
    occupied: "Ocupadas"
    free: "Livres"

# Movements
movements:
  list:
    title: "Listar Movimentos"
    filtered: "Movimentos Filtrados"
  undo:
    title: "Desfazer Movimento"
    success: "Movimento desfeito com sucesso"
    not_found: "Nenhum movimento encontrado para desfazer"
    error: "Erro ao desfazer movimento"
  create:
    title: "Criar Movimento"
    success: "Movimento criado com sucesso"
  get:
    title: "Obter Movimento"

# Export
export:
  title: "Exportar"
  csv:
    filename: "wms_relatorio_%{date}.csv"
    type: "TIPO"
    data: "DADOS"
    slots_title: "VAGAS"
    slots_header: "Endereço,Rua,Lane,Posição,Status,SKU,Atualizado em"
