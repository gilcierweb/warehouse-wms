_version: 1

# Errors
errors:
  not_found: "Recurso não encontrado: %{message}"
  bad_request: "Requisição inválida: %{message}"
  unauthorized: "Não autorizado"
  forbidden: "Proibido: %{message}"
  conflict: "Conflito: %{message}"
  database: "Erro de banco de dados: %{message}"
  internal: "Erro interno: %{message}"

# Auth
auth:
  login:
    title: "Login"
    success: "Login realizado com sucesso"
    failed: "Usuário ou senha inválidos"
    user_not_found: "Usuário não encontrado: %{username}"
  register:
    title: "Cadastro"
    success: "Usuário cadastrado com sucesso"
    username_exists: "Nome de usuário ou e-mail já existe"
  recover:
    title: "Recuperação de Senha"
    email_sent: "Se o e-mail existir, um link de recuperação foi enviado"
  reset:
    title: "Redefinição de Senha"
    token_invalid: "Token inválido ou expirado"
    success: "Senha atualizada com sucesso"
  me:
    title: "Usuário Atual"

# Slots
slots:
  list:
    title: "Listar Vagas"
  get:
    title: "Obter Vaga"
    not_found: "Vaga '%{address}' não encontrada"
  entry:
    title: "Entrada"
    success: "Entrada registrada com sucesso"
    slot_not_found: "Vaga não encontrada"
    slot_occupied: "Vaga não encontrada ou já ocupada"
